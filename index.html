<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Css File Link -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex justify-content-center align-items-center">
    <div class="clock">
      <!-- Heading of Clock -->
      <h1 class="heading">Clock</h1>

      <h1 id="time">
        <!-- Time display (hours, minutes, seconds, milliseconds) -->
        <span id="hr">00</span> : <span id="min">00</span> :
        <span id="sec">00</span>
        <!-- Milliseconds with timezone label -->
        <span id="milisec">00 IST</span>
      </h1>

      <p id="fullDate" class="milisec">
        <!-- Date display (Date DD/MM/YYYY, Day, Year) -->
        <span id="date" ></span> | <span id="day" ></span> |
        <span id="year" ></span>
        <!-- Milliseconds with timezone label -->
        
      </p>
    </div>
  </body>
  <!-- Js File Link -->
  <script src="script.js"></script>
</html>
